<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <pattern id="gridSmall" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e5ea" stroke-width="0.5"/>
    </pattern>
    <pattern id="gridLarge" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#gridSmall)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#d1d1d6" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f5f5f7"/>
  <rect x="0" y="0" width="400" height="300" rx="16" fill="url(#gridLarge)"/>
  <g transform="translate(200,150)">
    <rect x="-50" y="-35" width="100" height="70" rx="8" fill="none" stroke="#aeaeb2" stroke-width="2" stroke-dasharray="6,4"/>
    <circle cx="-18" cy="-10" r="4" fill="#aeaeb2"/>
    <polyline points="-50,15 -18,6 10,15 50,-5" fill="none" stroke="#aeaeb2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="-50,-20 -18,-28 10,-20" fill="none" stroke="#aeaeb2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>
</svg>
