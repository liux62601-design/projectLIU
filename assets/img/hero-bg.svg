    <pattern id="lineGrid" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 0 60 L 120 60" stroke="#ffffff" stroke-width="0.3" opacity="0.03"/>
      <path d="M 60 0 L 60 120" stroke="#ffffff" stroke-width="0.3" opacity="0.03"/>
    </pattern>
    <linearGradient id="lineFade" x1="0" y1="0" x2="1440" y2="900">
      <stop offset="0%" stop-color="#0a84ff" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#bf5af2" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0a84ff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="#000000"/>
  <rect width="1440" height="900" fill="url(#glowBlue)"/>
  <rect width="1440" height="900" fill="url(#glowPurple)"/>
  <rect width="1440" height="900" fill="url(#glowCenter)"/>
  <rect width="1440" height="900" fill="url(#dotGrid)"/>
  <rect width="1440" height="900" fill="url(#lineGrid)"/>
  <g opacity="0.03" stroke="#0a84ff" stroke-width="0.5">
