<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" fill="none">
  <defs>
    <radialGradient id="glowBlue" cx="35%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#0a84ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="65%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#bf5af2" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#bf5af2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#0a84ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dotGrid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="0.8" fill="#ffffff" opacity="0.04"/>
